[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trickle-observe"
version = "0.2.50"
description = "Zero-code runtime observability for Python. Auto-instruments FastAPI, Flask, Django, OpenAI, Anthropic, Gemini, LangChain, CrewAI. Captures functions, variables, LLM calls, agent workflows, tensor shapes."
requires-python = ">=3.9"
dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.entry-points."pytest11"]
trickle = "trickle.pytest_plugin"

[tool.setuptools.packages.find]
where = ["src"]
