[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trickle-observe"
version = "0.2.63"
description = "Runtime type annotations for Python — see tensor shapes, variable types, and crash-time values as you code."
readme = "README.md"
requires-python = ">=3.9"
license = {text = "Apache-2.0"}
keywords = ["runtime-types", "tensor-shapes", "pytorch", "debugging", "type-inference", "jupyter", "vscode"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Debuggers",
    "Framework :: Jupyter",
]
dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
lovely = ["lovely-tensors>=0.1.16"]
dev = ["pytest>=7.0"]

[project.entry-points."pytest11"]
trickle = "trickle.pytest_plugin"

[tool.setuptools.packages.find]
where = ["src"]
